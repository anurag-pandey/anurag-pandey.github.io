<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper" style="text-align: center;">
    <p>&copy; Anurag Pandey</p>
    <div class="social-media-list" style="display: inline-flex; gap: 16px;">
      {%- if site.github_username -%}
      <a href="https://github.com/{{ site.github_username | cgi_escape | escape }}"><svg class="svg-icon"><use xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use></svg></a>
      {%- endif -%}
      {%- if site.twitter_username -%}
      <a href="https://x.com/{{ site.twitter_username | cgi_escape | escape }}"><svg class="svg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
      {%- endif -%}
    </div>
  </div>

</footer>
